<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Registro</title>

<link rel="stylesheet"
href="css/styles.css">

</head>

<body>

<header>

<div class="logo">

<img
src="img/fondo1.jpeg"
alt="Logo">

<h1>Registro de Usuario</h1>

</div>

<nav>

<a href="index.html">

Inicio

</a>

<a href="login.html">

Login

</a>

</nav>

</header>

<main>

<section class="login-container">

<h2>

Crear Cuenta

</h2>

<form id="registroForm">

<input
type="text"
id="nombre"
placeholder="Nombre de usuario"
required>

<input
type="email"
id="email"
placeholder="Correo electrónico"
required>

<input
type="password"
id="password"
placeholder="Contraseña"
required>

<button type="submit">

Registrarse

</button>

</form>

<p id="mensaje">

</p>

</section>

</main>

<script src="js/api.js"></script>
<script src="js/registro.js"></script>

</body>

</html>
